# ddharmon GUI — TLS-terminating reverse proxy to the single uvicorn process on 127.0.0.1:8000.
#
# Unlike biomapper-ui (3 processes), the FastAPI app serves BOTH the built SPA and the /api
# routes, so nginx just proxies everything to one upstream. (Optional optimization: serve
# frontend/dist statically from nginx and proxy only /api/ — not needed for an internal tool.)
#
# certbot --nginx will rewrite this to add the :443 listener + HTTP->HTTPS redirect.

server {
    listen 80;
    server_name $DOMAIN;

    # Cohort dictionary uploads — several TSV/CSV files per run (CLSA ~6k fields ≈ a few MB each).
    client_max_body_size 50m;

    # --- access gate -------------------------------------------------------------------------
    # The app itself has NO authentication and sets CORS allow_origins=["*"]. If this host is
    # reachable beyond your trusted network, gate it. Enable AFTER certbot (basic-auth over
    # plain HTTP sends credentials in the clear):
    #   sudo apt-get install -y apache2-utils
    #   sudo htpasswd -c /etc/nginx/.ddharmon_htpasswd <user>
    # auth_basic "ddharmon";
    # auth_basic_user_file /etc/nginx/.ddharmon_htpasswd;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE progress stream (GET /api/harmonize/stream/{id}): flush events immediately and
        # hold the connection open for long runs (batch classify can take minutes-to-hours;
        # the stream emits a heartbeat every ~0.5s so the connection stays warm).
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }
}
